<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Add It Up!">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4A1D96">
    <title>Add It Up!</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234A1D96' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>➕</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --purple-deep: #4A1D96;
            --purple-mid: #7C3AED;
            --pink-pop: #EC4899;
            --orange-sunny: #F97316;
            --yellow-bright: #FACC15;
            --green-fresh: #22C55E;
            --blue-sky: #3B82F6;
            --cyan-cool: #06B6D4;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, var(--purple-deep) 0%, #7C3AED 50%, #9333EA 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 1rem;
            padding: 1rem;
            max-height: 100vh;
        }

        /* Left Side - Number Grid */
        .grid-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .number-cell {
            width: clamp(50px, 12vw, 80px);
            height: clamp(50px, 12vw, 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: white;
            border-radius: 1rem;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
        }

        .number-cell::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .number-cell:active {
            transform: scale(0.95);
        }

        .number-cell.selected {
            transform: scale(1.1);
            box-shadow: 0 0 0 4px white, 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: pulse 0.5s ease infinite alternate;
        }

        .number-cell.correct {
            animation: popOut 0.5s ease forwards;
        }

        .number-cell.wrong {
            animation: shake 0.4s ease;
        }

        .number-cell.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .color-0 { background: linear-gradient(135deg, #F472B6, var(--pink-pop)); }
        .color-1 { background: linear-gradient(135deg, #FB923C, var(--orange-sunny)); }
        .color-2 { background: linear-gradient(135deg, #FDE047, var(--yellow-bright)); color: #7C2D12; text-shadow: none; }
        .color-3 { background: linear-gradient(135deg, #4ADE80, var(--green-fresh)); }
        .color-4 { background: linear-gradient(135deg, #60A5FA, var(--blue-sky)); }
        .color-5 { background: linear-gradient(135deg, #22D3EE, var(--cyan-cool)); }
        .color-6 { background: linear-gradient(135deg, #A78BFA, var(--purple-mid)); }
        .color-7 { background: linear-gradient(135deg, #F87171, #EF4444); }

        /* Right Side - Target & Timer */
        .target-section {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .target-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            min-width: 160px;
        }

        .target-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .target-number {
            font-family: 'Lilita One', cursive;
            font-size: clamp(4rem, 15vw, 6rem);
            color: white;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            line-height: 1;
            animation: targetBounce 0.4s ease;
        }

        .timer-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .timer-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .timer-display {
            font-family: 'Lilita One', cursive;
            font-size: 2.5rem;
            color: var(--yellow-bright);
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
        }

        .progress-container {
            width: 100%;
            max-width: 160px;
        }

        .progress-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            height: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-fresh), var(--cyan-cool));
            border-radius: 6px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--green-fresh);
        }

        /* Screens */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--purple-deep) 0%, #7C3AED 50%, #9333EA 100%);
            z-index: 100;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .game-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: white;
            text-shadow: 4px 4px 0 var(--pink-pop), 8px 8px 0 rgba(0,0,0,0.2);
            margin-bottom: 1rem;
            animation: titleBounce 1s ease infinite alternate;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }

        .btn {
            font-family: 'Lilita One', cursive;
            font-size: 1.5rem;
            padding: 1rem 3rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-play {
            background: linear-gradient(135deg, var(--green-fresh), #16A34A);
            color: white;
            box-shadow: 0 8px 0 #15803D, 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn-play:active {
            box-shadow: 0 4px 0 #15803D, 0 10px 20px rgba(0,0,0,0.3);
            transform: translateY(4px);
        }

        .high-score-display {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }

        .high-score-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .high-score-value {
            font-family: 'Lilita One', cursive;
            font-size: 2rem;
            color: var(--yellow-bright);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        /* Win Screen */
        .win-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: white;
            text-shadow: 4px 4px 0 var(--pink-pop);
            margin-bottom: 1rem;
            animation: winBounce 0.5s ease;
        }

        .win-stars {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: starSpin 1s ease;
        }

        .final-time {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
        }

        .final-time-value {
            font-family: 'Lilita One', cursive;
            font-size: 3rem;
            color: var(--yellow-bright);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .new-record {
            background: linear-gradient(135deg, var(--yellow-bright), var(--orange-sunny));
            color: #7C2D12;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            margin: 1rem 0;
            animation: recordPulse 0.5s ease infinite alternate;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        /* Animations */
        @keyframes pulse {
            from { box-shadow: 0 0 0 4px white, 0 10px 30px rgba(0, 0, 0, 0.4); }
            to { box-shadow: 0 0 0 6px white, 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px white; }
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        @keyframes targetBounce {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes titleBounce {
            from { transform: scale(1) rotate(-2deg); }
            to { transform: scale(1.05) rotate(2deg); }
        }

        @keyframes winBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes starSpin {
            from { transform: rotate(-20deg) scale(0); }
            to { transform: rotate(0deg) scale(1); }
        }

        @keyframes recordPulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Decorative elements */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .bg-shape-2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            right: -50px;
            animation: float 8s ease-in-out infinite 1s;
        }

        .bg-shape-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            right: 10%;
            animation: float 7s ease-in-out infinite 0.5s;
        }

        /* Instructions */
        .instructions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .instruction-step {
            background: rgba(255, 255, 255, 0.15);
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .instruction-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .instruction-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <!-- Background Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1 class="game-title">Add It Up!</h1>
        <p class="game-subtitle">Find two numbers that add up to the target!</p>
        
        <div class="instructions">
            <div class="instruction-step">
                <div class="instruction-icon">👀</div>
                <div class="instruction-text">Look at the<br>target number</div>
            </div>
            <div class="instruction-step">
                <div class="instruction-icon">👆</div>
                <div class="instruction-text">Tap two numbers<br>that add up to it</div>
            </div>
            <div class="instruction-step">
                <div class="instruction-icon">⚡</div>
                <div class="instruction-text">Be fast to<br>beat your record!</div>
            </div>
        </div>
        
        <button class="btn btn-play" onclick="startGame()">Play!</button>
        
        <div id="startHighScore" class="high-score-display" style="display: none;">
            <div class="high-score-label">Best Time</div>
            <div class="high-score-value" id="startHighScoreValue">--</div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-container">
        <div class="grid-section">
            <div class="number-grid" id="numberGrid"></div>
        </div>
        
        <div class="target-section">
            <div class="target-container">
                <div class="target-label">Find</div>
                <div class="target-number" id="targetNumber">0</div>
            </div>
            
            <div class="timer-container">
                <div class="timer-label">Time</div>
                <div class="timer-display" id="timerDisplay">0:00</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-label">Pairs Left: <span id="pairsLeft">8</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="winScreen" class="screen hidden">
        <div class="win-stars">⭐🌟⭐</div>
        <h1 class="win-title">Amazing!</h1>
        <div class="final-time">You finished in</div>
        <div class="final-time-value" id="finalTime">0:00</div>
        <div id="newRecord" class="new-record" style="display: none;">🏆 New Record! 🏆</div>
        
        <div class="high-score-display">
            <div class="high-score-label">Best Time</div>
            <div class="high-score-value" id="winHighScoreValue">--</div>
        </div>
        
        <button class="btn btn-play" onclick="startGame()" style="margin-top: 1.5rem;">Play Again!</button>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // Game State
        let numbers = [];
        let selectedIndices = [];
        let targetNumber = 0;
        let timerInterval = null;
        let startTime = 0;
        let elapsedTime = 0;
        let pairsRemaining = 8;
        const totalPairs = 8;
        const gridSize = 16;

        // Colors for confetti
        const confettiColors = ['#EC4899', '#F97316', '#FACC15', '#22C55E', '#3B82F6', '#06B6D4', '#7C3AED', '#EF4444'];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateHighScoreDisplays();
        });

        function updateHighScoreDisplays() {
            const highScore = getHighScore();
            const startHSDisplay = document.getElementById('startHighScore');
            const startHSValue = document.getElementById('startHighScoreValue');
            const winHSValue = document.getElementById('winHighScoreValue');

            if (highScore !== null) {
                startHSDisplay.style.display = 'block';
                startHSValue.textContent = formatTime(highScore);
                winHSValue.textContent = formatTime(highScore);
            } else {
                startHSDisplay.style.display = 'none';
                winHSValue.textContent = '--';
            }
        }

        function getHighScore() {
            const saved = localStorage.getItem('addItUpHighScore');
            return saved ? parseInt(saved, 10) : null;
        }

        function setHighScore(time) {
            localStorage.setItem('addItUpHighScore', time.toString());
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const tenths = Math.floor((ms % 1000) / 100);
            return `${minutes}:${seconds.toString().padStart(2, '0')}.${tenths}`;
        }

        function generateNumbers() {
            // Generate 8 pairs of numbers that can form valid sums
            const pairs = [];
            
            for (let i = 0; i < 8; i++) {
                // Generate two random single digits (1-9)
                const a = Math.floor(Math.random() * 9) + 1;
                const b = Math.floor(Math.random() * 9) + 1;
                pairs.push({ a, b, sum: a + b });
            }
            
            // Flatten to array of numbers and shuffle
            const allNumbers = pairs.flatMap(p => [p.a, p.b]);
            
            // Fisher-Yates shuffle
            for (let i = allNumbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allNumbers[i], allNumbers[j]] = [allNumbers[j], allNumbers[i]];
            }
            
            return allNumbers;
        }

        function findValidTarget(availableNumbers) {
            // Find all valid pairs from available numbers
            const validPairs = [];
            
            for (let i = 0; i < availableNumbers.length; i++) {
                for (let j = i + 1; j < availableNumbers.length; j++) {
                    if (availableNumbers[i] !== null && availableNumbers[j] !== null) {
                        validPairs.push({
                            indices: [i, j],
                            sum: availableNumbers[i] + availableNumbers[j]
                        });
                    }
                }
            }
            
            if (validPairs.length === 0) return null;
            
            // Pick a random valid pair and return its sum
            const chosen = validPairs[Math.floor(Math.random() * validPairs.length)];
            return chosen.sum;
        }

        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            
            numbers.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = `number-cell color-${index % 8}`;
                cell.textContent = num !== null ? num : '';
                cell.dataset.index = index;
                
                if (num === null) {
                    cell.classList.add('hidden');
                }
                
                cell.addEventListener('click', () => handleCellClick(index));
                grid.appendChild(cell);
            });
        }

        function handleCellClick(index) {
            if (numbers[index] === null) return;
            
            const cells = document.querySelectorAll('.number-cell');
            const cell = cells[index];
            
            // If already selected, deselect
            if (selectedIndices.includes(index)) {
                selectedIndices = selectedIndices.filter(i => i !== index);
                cell.classList.remove('selected');
                return;
            }
            
            // If we already have 2 selected, ignore
            if (selectedIndices.length >= 2) return;
            
            // Select this cell
            selectedIndices.push(index);
            cell.classList.add('selected');
            
            // If we have 2 selected, check if they sum to target
            if (selectedIndices.length === 2) {
                const [i1, i2] = selectedIndices;
                const sum = numbers[i1] + numbers[i2];
                
                if (sum === targetNumber) {
                    // Correct!
                    handleCorrectMatch(i1, i2);
                } else {
                    // Wrong!
                    handleWrongMatch();
                }
            }
        }

        function handleCorrectMatch(i1, i2) {
            const cells = document.querySelectorAll('.number-cell');
            
            // Add correct animation
            cells[i1].classList.remove('selected');
            cells[i2].classList.remove('selected');
            cells[i1].classList.add('correct');
            cells[i2].classList.add('correct');
            
            // Remove numbers after animation
            setTimeout(() => {
                numbers[i1] = null;
                numbers[i2] = null;
                cells[i1].classList.add('hidden');
                cells[i2].classList.add('hidden');
                cells[i1].classList.remove('correct');
                cells[i2].classList.remove('correct');
                
                pairsRemaining--;
                updateProgress();
                
                if (pairsRemaining === 0) {
                    endGame();
                } else {
                    setNewTarget();
                }
            }, 400);
            
            selectedIndices = [];
        }

        function handleWrongMatch() {
            const cells = document.querySelectorAll('.number-cell');
            const [i1, i2] = selectedIndices;
            
            cells[i1].classList.add('wrong');
            cells[i2].classList.add('wrong');
            
            setTimeout(() => {
                cells[i1].classList.remove('selected', 'wrong');
                cells[i2].classList.remove('selected', 'wrong');
                selectedIndices = [];
            }, 400);
        }

        function setNewTarget() {
            targetNumber = findValidTarget(numbers);
            const targetEl = document.getElementById('targetNumber');
            targetEl.style.animation = 'none';
            targetEl.offsetHeight; // Trigger reflow
            targetEl.style.animation = 'targetBounce 0.4s ease';
            targetEl.textContent = targetNumber;
        }

        function updateProgress() {
            const completed = totalPairs - pairsRemaining;
            const percent = (completed / totalPairs) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('pairsLeft').textContent = pairsRemaining;
        }

        function updateTimer() {
            elapsedTime = Date.now() - startTime;
            document.getElementById('timerDisplay').textContent = formatTime(elapsedTime);
        }

        function startGame() {
            // Reset state
            numbers = generateNumbers();
            selectedIndices = [];
            pairsRemaining = totalPairs;
            elapsedTime = 0;
            
            // Hide screens
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            
            // Render and start
            renderGrid();
            setNewTarget();
            updateProgress();
            
            // Start timer
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
            document.getElementById('timerDisplay').textContent = '0:00.0';
        }

        function endGame() {
            // Stop timer
            clearInterval(timerInterval);
            
            // Check for high score
            const highScore = getHighScore();
            const isNewRecord = highScore === null || elapsedTime < highScore;
            
            if (isNewRecord) {
                setHighScore(elapsedTime);
            }
            
            // Update win screen
            document.getElementById('finalTime').textContent = formatTime(elapsedTime);
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';
            updateHighScoreDisplays();
            
            // Show win screen with confetti
            setTimeout(() => {
                document.getElementById('winScreen').classList.remove('hidden');
                createConfetti();
            }, 300);
        }

        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                container.appendChild(confetti);
            }
            
            // Clean up after animation
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
